<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vyron AI</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

#chat {
  width: 90%;
  height: 300px;
  border: 1px solid orange;
  margin: auto;
  overflow-y: auto;
  padding: 10px;
}

input {
  width: 70%;
  padding: 10px;
}

button {
  padding: 10px;
  background: orange;
  border: none;
}
</style>
</head>

<body>

<h2>🤖 Vyron AI</h2>

<div id="chat"></div>

<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>

<script>
function send() {
  let text = document.getElementById("msg").value;

  fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({text: text})
  })
  .then(res => res.json())
  .then(data => {
    let chat = document.getElementById("chat");
    chat.innerHTML += "<p>🧑: " + text + "</p>";
    chat.innerHTML += "<p>🤖: " + data.reply + "</p>";
  });
}
</script>

</body>
</html>
